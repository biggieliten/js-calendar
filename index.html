<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=, initial-scale=1.0">
	<link rel="stylesheet" href="style/main.css">
	<link rel="stylesheet" href="style/calendar.css">
	<script type="module" src="script/main.js" defer></script>
	<title>OnlyPlans</title>
</head>

<body>
	<header class="header">
		<img src="assets/logo.svg" alt="logo">
	</header>
	<div class="main-wrapper">

		<!-- Hide aside in mobile view -->
		<aside class="aside">
		</aside>
		<main>
			<section class="calendar-section">
				<p class="calendar-year"></p>
				<div class="calendar-month-part">
					<div class="calendar-month"></div>
					<div class="calendar-change-icons">
						<button class="decrease-month"><img class="arrows"
								src="/assets/MaterialSymbolsArrowCircleLeft.svg" alt="left arrow icon"></button>
						<button class="increase-month"><img class="arrows"
								src="/assets//MaterialSymbolsArrowCircleRight.svg" alt="right arrow icon"></button>
					</div>
				</div>
				<div class="calendar-div">
					<section class="calendar-days">
						<p class="calendar-day">Måndag</p>
						<p class="calendar-day">Tisdag</p>
						<p class="calendar-day">Onsdag</p>
						<p class="calendar-day">Torsdag</p>
						<p class="calendar-day">Fredag</p>
						<p class="calendar-day">Lördag</p>
						<p class="calendar-day">Söndag</p>
					</section>
					<section id="calendar-container" class="calendar-container"> </section>
				</div>
			</section>

			<!-- Hide nav in desktop view -->
			<nav class="mobile-navbar">
				<button>
					<span class="calendar-icon"><a href="/index.html"></a></span>
				</button>
				<button>
					<span class="todos-icon"><a href="/mobile-todos.html"></a></span>
				</button>
			</nav>
		</main>
	</div>
</body>

</html>
