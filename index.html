<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=, initial-scale=1.0">
	<link rel="stylesheet" href="style/main.css">
	<script type="module" src="script/main.js" defer></script>
	<title>OnlyPlans</title>
</head>

<body>
	<header class="header">
		<img src="assets/logo.svg" alt="logo">
	</header>
	<div class="main-wrapper">

		<!-- Hide aside in mobile view -->
		<aside class="aside">
		</aside>
		<main>
			<section class="calendar-section">
				<p class="calender-year"></p>
				<p class="calendar-month"></p>
				<p class="calendar-days"></p>
				<div class="calendar"></div>
				<div>
					<button class="decrease-month"><img class="arrows" src="/assets/MaterialSymbolsArrowCircleLeft.svg" alt=""></button>
					<button class="increase-month"><img class="arrows" src="/assets//MaterialSymbolsArrowCircleRight.svg" alt=""></button>
				</div>
			</section>

			<!-- Hide nav in desktop view -->
			<nav class="mobile-navbar">
				<button>
					<span class="calendar-icon"><a href="/index.html"></a></span>
				</button>
				<button>
					<span class="todos-icon"><a href="/mobile-todos.html"></a></span>
				</button>
			</nav>
		</main>
	</div>
</body>

</html>
