<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=, initial-scale=1.0">
	<link rel="icon" type="image/x-icon" href="assets/favicon.png">
	<link rel="stylesheet" href="style/main.css">
	<link rel="stylesheet" href="style/header.css">
	<link rel="stylesheet" href="style/todo.css">
	<link rel="stylesheet" href="style/welcomeMessage.css">
	<link rel="stylesheet" href="style/navbar.css">
	<script type="module" src="script/main.js"></script>
	<link rel="stylesheet" href="style/calendar.css">
	<title>OnlyPlans</title>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
	<header class="header">
		<img src="assets/logo.svg" alt="logo" class="logo">
		<nav class="navbar">
			<div class="nav-side">
				<span class="nav-item">Din kalender</span>
			</div>
			<div class="nav-side hide-mobile show-desktop" id="nav-right-desktop">
				<a href="">
					<span class="material-symbols-outlined nav-item">notifications</span>
				</a>
				<a href="">
					<span class="material-symbols-outlined nav-item">account_circle</span>
				</a>
			</div>
			<div class="nav-side burger-div" id="nav-right-desktop">
				<a href="">
					<span class="material-symbols-outlined nav-item">menu</span>
				</a>
			</div>
		</nav>
	</header>
	<div class="main-wrapper">

		<!-- Hide aside in mobile view -->
		<aside class="aside">
			<section class="welcome-section">
				<h2 class="welcome-title">Välkommen</h2>
				<div class="welcome-info">
					<p class="welcome-info-text capitalize" id="welcome-day">veckodag</p>
					<p class="welcome-info-text capitalize" id="welcome-date">månad datum</p>
					<p class="welcome-info-text" id="welcome-time">tid</p>
				</div>
			</section>
			<div class="todo-wrapper">
				<div class="todo-header-box">
					<h1>Today</h1>
					<button class="todo-add-btn">
						<span class="material-symbols-outlined todo-add-icon">
							add_2
						</span>
					</button>
				</div>
				<section class="todo-section-today"></section>
				<h2>Upcoming</h2>
				<section class="todo-section-upcoming"></section>
				<h2>Completed</h2>
				<section class="todo-section-completed"></section>
			</div>
		</aside>

		<!-- <aside class="todo-sidebar ">
		</aside> -->

		<main class="main">
			<section class="calendar-section">
				<div class="calendar-month-part">
					<button id="decrease-month"><span class="material-symbols-outlined calendar-arrows">
							arrow_circle_left
						</span></button>
					<h3 class="calendar-month-year" id="calendar-month-year">Month - year</h3>
					<button id="increase-month"><span class="material-symbols-outlined calendar-arrows">
							arrow_circle_right
						</span></button>
				</div>
				<div class="calendar-div">
					<section class="calendar-days">
						<p class="calendar-day">Måndag</p>
						<p class="calendar-day">Tisdag</p>
						<p class="calendar-day">Onsdag</p>
						<p class="calendar-day">Torsdag</p>
						<p class="calendar-day">Fredag</p>
						<p class="calendar-day">Lördag</p>
						<p class="calendar-day">Söndag</p>
					</section>
					<section id="calendar-container" class="calendar-container"> </section>
				</div>
			</section>

		</main>
		<section class="todo-form-section hidden">
			<button class="todo-form-back-btn">
				<span class="material-symbols-outlined todo-form-back-icon">
					arrow_back
				</span>
			</button>
			<form class="todo-form">
				<h2>Ny Händelse</h2>
				<hr>
				<label for="title">Rubrik</label>
				<input type="text" name="title" id="title" placeholder="Ange rubrik" required>
				<label for="description">Beskrvning</label>
				<textarea name="description" id="description" placeholder="Ange beskrivning"></textarea>
				<label for="startAt">Start</label>
				<input type="datetime-local" name="startAt" id="startAt" placeholder="Välj start" required>
				<label for="endAt">Slut</label>
				<input type="datetime-local" name="endAt" id="endAt" placeholder="Välj slut" required>
				<button type="submit" class="form-submit-btn">Spara</button>
			</form>
		</section>
	</div>

	<nav class="mobile-navbar">
		<button class="nav-btn-calendar">
			<span class="material-symbols-outlined calendar-icon active">
				calendar_month
			</span>
		</button>
		<button class="nav-btn-todo">
			<span class="material-symbols-outlined todo-icon">
				assignment
			</span>
		</button>
	</nav>
</body>

</html>
