<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=, initial-scale=1.0">
	<link rel="icon" href="assets/favicon.ico">
	<link rel="stylesheet" href="style/main.css">
	<link rel="stylesheet" href="style/header.css">
	<link rel="stylesheet" href="style/todo.css">
	<link rel="stylesheet" href="style/navbar.css">
	<script type="module" src="script/main.js"></script>
	<title>OnlyPlans</title>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>
	<header class="header">
		<img src="assets/logo.svg" alt="logo" class="logo">
		<nav class="navbar">
			<div class="nav-side">
				<span class="nav-item">Din kalender</span>
			</div>
			<div class="nav-side hide-mobile show-desktop" id="nav-right-desktop">
				<a href="">
					<span class="material-symbols-outlined nav-item">notifications</span>
				</a>
				<a href="">
					<span class="material-symbols-outlined nav-item">account_circle</span>
				</a>
			</div>
			<div class="nav-side burger-div" id="nav-right-desktop">
				<a href="">
					<span class="material-symbols-outlined nav-item">menu</span>
				</a>
			</div>
		</nav>
	</header>
	<div class="main-wrapper">

		<!-- Hide aside in mobile view -->
		<div class="todo-wrapper">
			<h1>Today</h1>
			<section class="todo-section-today"></section>
			<h2>Upcoming</h2>
			<section class="todo-section-upcoming"></section>
			<h2>Completed</h2>
			<section class="todo-section-completed"></section>
		</div>

		<!-- <aside class="todo-sidebar ">
		</aside> -->

		<main>
			<section class="calendar-section"></section>
		</main>
	</div>


	<!-- Hide nav in desktop view -->
	<nav class="mobile-navbar">
		<button class="nav-btn-calendar">
			<span class="material-symbols-outlined calendar-icon active">
				calendar_month
			</span> </button>
		<button class="nav-btn-todo">
			<span class="material-symbols-outlined todo-icon">
				assignment
			</span> </button>
	</nav>
</body>

</html>
